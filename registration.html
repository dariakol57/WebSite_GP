<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание личного альбома</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .reg-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
        }

        .reg-panel {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.5s ease-out;
        }

        .reg-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #919bb1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .reg-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .reg-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 15px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .reg-input:focus {
            border-color: var(--accent);
        }

        .reg-btn {
            margin-top: 10px;
            justify-content: center;
            width: 100%;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container reg-container">
        <div class="glass-panel reg-panel">
            <h1 class="reg-title">✨ Мой альбом</h1>

            <div>
                <label class="reg-label" for="reg-name">Ваше имя</label>
                <input class="reg-input" id="reg-name" type="text" placeholder="Например: Глафира">
            </div>

            <div>
                <label class="reg-label" for="reg-surname">Ваша фамилия</label>
                <input class="reg-input" id="reg-surname" type="text" placeholder="Например: By">
            </div>

            <div>
                <label class="reg-label" for="reg-email">Ваш Email</label>
                <input class="reg-input" id="reg-email" type="email" placeholder="example@mail.com">
            </div>

            <div>
                <label class="reg-label" for="reg-photo">Ваше фото (Файл)</label>
                <input class="reg-input" style="padding: 9px 15px; cursor: pointer;" id="reg-photo" type="file"
                    accept="image/*">
            </div>

            <div>
                <label class="reg-label" for="reg-password">Пароль</label>
                <input class="reg-input" id="reg-password" type="password" placeholder="Введите пароль">
            </div>

            <div>
                <label class="reg-label" for="reg-password-confirm">Подтвердите пароль</label>
                <input class="reg-input" id="reg-password-confirm" type="password" placeholder="Повторите пароль">
            </div>

            <!-- <div>
                <label class="reg-label" for="reg-photo-url">Или вставьте ссылку на фото</label>
                <input class="reg-input" id="reg-photo-url" type="text" placeholder="https://...">
            </div> -->

            <button id="create-album-btn" class="btn btn-primary reg-btn">Создать мой альбом</button>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_client.js"></script>

    <script>
        document.getElementById('create-album-btn').addEventListener('click', async () => {
            const name = document.getElementById('reg-name').value.trim();
            const surname = document.getElementById('reg-surname').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const photoInput = document.getElementById('reg-photo');
            const password = document.getElementById('reg-password').value;
            const passwordConfirm = document.getElementById('reg-password-confirm').value;

            if (!name) { alert('Пожалуйста, введите имя'); return; }
            if (!surname) { alert('Пожалуйста, введите фамилию'); return; }
            if (!email) { alert('Пожалуйста, введите Email'); return; }
            if (!password || password.length < 6) { alert('Пожалуйста, введите пароль (минимум 6 символов)'); return; }
            if (password !== passwordConfirm) { alert('Пароли не совпадают!'); return; }

            const ownerId = `${name}_${surname}`.replace(/\s+/g, '_');

            // Photo handling
            let finalPhotoUrl = 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=400';

            if (photoInput.files[0]) {
                const reader = new FileReader();
                finalPhotoUrl = await new Promise(resolve => {
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(photoInput.files[0]);
                });
            }

            try {
                // 1. Sign up user via Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) throw authError;

                if (!authData.user) {
                    throw new Error("Не удалось создать пользователя.");
                }

                // 2. Create Profile record in database
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert([
                        {
                            id: authData.user.id,
                            username: ownerId,
                            first_name: name,
                            last_name: surname,
                            photo_url: finalPhotoUrl,
                            about: `Кто я? <br> Что для меня важно?`
                        }
                    ]);

                if (profileError) throw profileError;

                // 3. Create Default Section
                const { error: sectionError } = await supabase
                    .from('sections')
                    .insert([
                        {
                            profile_id: authData.user.id,
                            name: 'Альбом замечательных людей',
                            visibility: 'public'
                        }
                    ]);

                if (sectionError) throw sectionError;

                alert('Регистрация успешна!');

                // Set local login state
                localStorage.setItem('AlbomZL_currentUser', ownerId);

                // Redirect to dynamic profile
                window.location.href = `profile.html?user=${ownerId}`;

            } catch (error) {
                console.error("Registration error:", error);

                // Provide clearer error message if user already exists
                if (error.message.includes("already registered")) {
                    alert("Ошибка: Пользователь с таким именем уже существует!");
                } else {
                    alert("Ошибка регистрации: " + error.message);
                }
            }
        });
    </script>
</body>

</html>
